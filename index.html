<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>수입상품 재고현황</title>
<meta name="description" content="iloom 수입상품 재고현황 일별 리포트">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F2337;--blue:#2E86C1;--ink:#1B4F72;
  --border:#DCE4EE;--muted:#607080;--bg:#F4F7FB;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:var(--bg);color:#1A2B3C}

/* ── TOP BAR ── */
.topbar{
  background:var(--navy);color:#fff;
  display:flex;align-items:center;gap:14px;
  padding:0 22px;height:54px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.topbar-title{
  font-size:18px;font-weight:700;letter-spacing:.3px;
  margin-right:4px;
}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;position:relative}

/* ── DATE CHIP (재고일보 스타일: 흰색 배경) ── */
.date-picker{position:relative}
.date-chip{
  display:flex;align-items:center;gap:8px;
  background:#fff;border-radius:6px;
  padding:7px 16px;
  font-size:14px;font-weight:600;color:#1A2B3C;
  cursor:pointer;-webkit-user-select:none;user-select:none;
  transition:background .12s;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}
.date-chip:hover{background:#eef2f8}
.date-chip svg{color:var(--navy);flex-shrink:0}
.date-chip .arrow{font-size:10px;color:#888;margin-left:2px}

/* ── DATE DROPDOWN ── */
.date-dropdown{
  display:none;position:absolute;top:calc(100% + 6px);right:0;
  background:#fff;border:1px solid var(--border);border-radius:7px;
  box-shadow:0 6px 20px rgba(0,0,0,.15);min-width:170px;z-index:999;
  overflow:hidden;
}
.date-dropdown.open{display:block}
.dd-item{
  padding:9px 16px;font-size:13px;color:#1A2B3C;cursor:pointer;
  transition:background .1s;white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.dd-item:hover{background:#F0F4FA}
.dd-item.active{background:var(--navy);color:#fff;font-weight:600}

/* ── DOWNLOAD BUTTONS ── */
.dl-btn{
  display:flex;align-items:center;gap:7px;
  background:#1D6A3A;border:none;border-radius:6px;
  padding:7px 15px;font-size:13px;font-weight:600;color:#fff;
  cursor:pointer;text-decoration:none;transition:background .12s;
  white-space:nowrap;
}
.dl-btn:hover{background:#27AE60}
.dl-btn.po{background:#1F5C99}
.dl-btn.po:hover{background:#2874A6}

/* ── SUB HEADER ── */
.subhdr{
  background:#fff;border-bottom:1px solid var(--border);
  padding:9px 22px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.subhdr-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:3px}
.subhdr-meta{font-size:12px;color:var(--muted)}
.subhdr-meta .sep{margin:0 7px;color:#c8d2de}
.subhdr-meta a{color:var(--blue);text-decoration:none}

/* ── CONTENT ── */
.report-frame{
  width:100%;border:none;display:block;
  height:calc(100vh - 54px - 48px);
}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:calc(100vh - 54px - 48px);color:var(--muted);gap:14px;
}
.empty-icon{font-size:44px;opacity:.2}
.empty-state p{font-size:14px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-title">수입상품 재고현황</span>
  <div class="topbar-right">

    <!-- 날짜 선택 -->
    <div class="date-picker" id="date-picker">
      <div class="date-chip" id="date-chip" onclick="toggleDropdown()">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="2" width="14" height="13" rx="2" stroke="#0F2337" stroke-width="1.6"/>
          <path d="M5 1v3M11 1v3M1 6h14" stroke="#0F2337" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span id="hdr-date">—</span>
        <span class="arrow">▾</span>
      </div>
      <div class="date-dropdown" id="date-dropdown"></div>
    </div>

    <!-- 재고현황 다운로드 -->
    <a class="dl-btn" id="btn-xl" href="#" style="display:none">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="14" height="14" rx="2" fill="#217346"/>
        <path d="M4 4h3l1.5 3L10 4h2L9.5 8 12 12h-2L8.5 9 7 12H5l2.5-4L4 4z" fill="white"/>
      </svg>
      재고현황 다운로드
    </a>

    <!-- PO현황 다운로드 -->
    <a class="dl-btn po" id="btn-po" href="#" style="display:none">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="14" height="14" rx="2" fill="#1F5C99"/>
        <path d="M4 4h3l1.5 3L10 4h2L9.5 8 12 12h-2L8.5 9 7 12H5l2.5-4L4 4z" fill="white"/>
      </svg>
      PO현황 다운로드
    </a>
  </div>
</div>

<!-- SUB HEADER -->
<div class="subhdr">
  <div class="subhdr-title">수입상품 재고현황</div>
  <div class="subhdr-meta" id="sub-meta">데이터를 불러오는 중...</div>
</div>

<!-- CONTENT -->
<div class="empty-state" id="empty-state">
  <div class="empty-icon">📦</div>
  <p>등록된 리포트가 없습니다</p>
</div>
<iframe class="report-frame" id="report-frame" src="" style="display:none"></iframe>

<script>
const BASE = location.pathname.replace(/\/?([^/]*)$/, '/');

async function loadManifest() {
  try {
    const r = await fetch(BASE + 'reports/manifest.json?t=' + Date.now());
    return await r.json();
  } catch(e) { return {reports:[]}; }
}

function fmtDate(d) {
  if (!d) return '—';
  return d.slice(0,4) + '년 ' + d.slice(4,6) + '월 ' + d.slice(6,8) + '일';
}

let ddOpen = false;
function toggleDropdown() {
  ddOpen = !ddOpen;
  document.getElementById('date-dropdown').classList.toggle('open', ddOpen);
}
document.addEventListener('click', e => {
  if (!document.getElementById('date-picker').contains(e.target)) {
    ddOpen = false;
    document.getElementById('date-dropdown').classList.remove('open');
  }
});

function buildDropdown(reports) {
  const dd = document.getElementById('date-dropdown');
  dd.innerHTML = '';
  reports.forEach(entry => {
    const item = document.createElement('div');
    item.className = 'dd-item';
    item.dataset.date = entry.date;
    item.textContent = entry.label || fmtDate(entry.date);
    item.onclick = () => {
      selectReport(entry);
      ddOpen = false;
      dd.classList.remove('open');
    };
    dd.appendChild(item);
  });
}

function selectReport(entry) {
  const frame   = document.getElementById('report-frame');
  const empty   = document.getElementById('empty-state');
  const hdrDate = document.getElementById('hdr-date');
  const subMeta = document.getElementById('sub-meta');
  const btnXl   = document.getElementById('btn-xl');
  const btnPo   = document.getElementById('btn-po');

  if (!entry) {
    frame.style.display = 'none';
    empty.style.display = 'flex';
    hdrDate.textContent = '—';
    subMeta.textContent = '리포트 없음';
    btnXl.style.display = btnPo.style.display = 'none';
    return;
  }

  frame.src = BASE + entry.html;
  frame.style.display = 'block';
  empty.style.display = 'none';

  hdrDate.textContent = fmtDate(entry.date);

  const xlsxName = entry.xlsx_file ? entry.xlsx_file.split('/').pop() : '—';
  subMeta.innerHTML =
    '기준일자: ' + fmtDate(entry.date) +
    '<span class="sep">|</span>파일: ' + xlsxName;

  btnXl.style.display = entry.xlsx_file ? 'flex' : 'none';
  if (entry.xlsx_file) btnXl.href = BASE + entry.xlsx_file;

  btnPo.style.display = entry.po_file ? 'flex' : 'none';
  if (entry.po_file) btnPo.href = BASE + entry.po_file;

  document.querySelectorAll('.dd-item').forEach(el =>
    el.classList.toggle('active', el.dataset.date === entry.date)
  );
}

async function init() {
  const manifest = await loadManifest();
  const reports  = manifest.reports || [];

  if (!reports.length) {
    document.getElementById('sub-meta').textContent = '등록된 리포트가 없습니다';
    return;
  }

  buildDropdown(reports);
  selectReport(reports[0]);
}

init();
</script>
</body>
</html>
